name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-crate:
    name: Publish seqa_core to crates.io
    runs-on: ubuntu-latest
    environment: TEST
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish seqa_core
        run: cargo publish -p seqa_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-cli:
    name: Build seqa (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            binary: seqa
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            binary: seqa
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            binary: seqa
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            binary: seqa
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            binary: seqa
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            binary: seqa.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build (cargo)
        if: ${{ !matrix.use_cross }}
        run: cargo build -p seqa --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build -p seqa --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqa-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}
          if-no-files-found: error

  build-axum:
    name: Build seqa_axum (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: seqa_axum-x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: sudo apt-get install -y libsqlite3-dev

      - name: Build
        run: cargo build -p seqa_axum --release --target x86_64-unknown-linux-gnu

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: seqa_axum-x86_64-unknown-linux-gnu
          path: target/x86_64-unknown-linux-gnu/release/seqa_axum
          if-no-files-found: error

  upload-s3-cli:
    name: Upload seqa to S3 (${{ matrix.target }})
    needs: build-cli
    runs-on: ubuntu-latest
    environment: TEST
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            binary: seqa
          - target: x86_64-unknown-linux-musl
            binary: seqa
          - target: aarch64-unknown-linux-gnu
            binary: seqa
          - target: x86_64-apple-darwin
            binary: seqa
          - target: aarch64-apple-darwin
            binary: seqa
          - target: x86_64-pc-windows-msvc
            binary: seqa.exe
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: seqa-${{ matrix.target }}
          path: dist/

      - name: Upload to S3
        run: aws s3 cp dist/${{ matrix.binary }} s3://com.soma23/${{ matrix.target }}/${{ matrix.binary }}

  upload-s3-axum:
    name: Upload seqa_axum to S3
    needs: build-axum
    runs-on: ubuntu-latest
    environment: TEST
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: seqa_axum-x86_64-unknown-linux-gnu
          path: dist/

      - name: Upload to S3
        run: aws s3 cp dist/seqa_axum s3://com.soma23/x86_64-unknown-linux-gnu/seqa_axum
